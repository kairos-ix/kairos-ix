name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: kairos-ix
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=e8e8e8&color_dots=1a1a1a,333333,4d4d4d,666666,808080
            dist/github-contribution-grid-snake-dark.svg?color_snake=e8e8e8&color_dots=1a1a1a,333333,4d4d4d,666666,808080
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
